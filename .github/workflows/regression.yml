name: Selenium Python CI
on: 
  push:
    branches: [ main ]
  workflow_dispatch: # This adds the "Run workflow" button

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'  # Updated to match your local 3.13.x version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-html selenium pytest-xdist pytest-bdd  # <--- Add it here
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Create Reports Directory
        run: mkdir -p reports

      - name: Run Selenium Tests
        env:
          PYTHONPATH: .
        run: |
          python -m pytest  # Using 'python -m' ensures the correct environment is used
        if: always()



      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: selenium-test-report-run-${{ github.run_number }}
          path: |
            reports/report.html
            logs/
          overwrite: true  # Optional safety net
          if-no-files-found: ignore  # <--- Use this to prevent Exit Code 1

