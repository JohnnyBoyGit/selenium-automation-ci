name: Selenium Python CI
on: 
  push:
    branches: [ main ]
  workflow_dispatch: # This adds the "Run workflow" button

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout Code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.13'  # Updated to match your local 3.13.x version
          check-latest: true
          
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          # Explicitly install the plugins causing the potential usage error
          pip install pytest pytest-html pytest-xdist pytest-bdd selenium
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

      - name: Run Selenium Tests
        run: |
          python -m pytest
        if: always()


      - name: Upload Test Report Artifact
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: selenium-test-report-run-${{ github.run_number }}
          path: |
            reports/report.html
            logs/
          overwrite: true  # Optional safety net
          if-no-files-found: ignore  # <--- Use this to prevent Exit Code 1

